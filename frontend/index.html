<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <title>DopaNotes</title>
        <script src="https://cdn.tailwindcss.com"></script>

        <script src="https://unpkg.com/@phosphor-icons/web"></script>

        <style>
            @keyframes float-violet {
                0%, 100% { transform: translate(0px, 0px); }
                50% { transform: translate(400px, 200px); }
            }

            @keyframes float-fuchsia {
                0%, 100% { transform: translate(0px, 0px); }
                50% { transform: translate(-400px, -100px); }
            }

            .light-anim-violet {
                animation: float-violet 10s ease-in-out infinite;
            }
            .light-anim-fuchsia {
                animation: float-fuchsia 14s ease-in-out infinite;
            }
        </style>
    </head>

    <body class="bg-zinc-900/80 text-white max-w-lg mx-auto">
        <div class="fixed top-0 -left-10 w-72 h-72 bg-violet-600/30 rounded-full blur-3xl -z-10 light-anim-violet"></div>
        <div class="fixed bottom-0 -right-10 w-72 h-72 bg-fuchsia-600/30 rounded-full blur-3xl -z-10 light-anim-fuchsia"></div>

        <header class="p-4 mb-10">
            <div class="flex items-center justify-between w-full">
                <div class="flex items-center gap-2">
                    <h2 class="ph ph-house text-2xl font-bold"></h2>
                    <h2 data-i18n="home" class="text-2xl font-bold">Inicio</h2>
                </div>
                <h2 id="api-check" class="ph ph-cloud-x text-red-500 text-2xl font-bold"></h2>
            </div>
        </header>

        <main class="p-6 grid grid-cols-2 gap-4">
            <div onclick="window.location.href='tasks.html'" class="bg-zinc-800/50 backdrop-blur-md rounded-2xl p-5 text-center cursor-pointer hover:opacity-80">
                <h2 data-i18n="todays_tasks" class="text-sm text-zinc-400">Tarefas de Hoje</h2>
                <p id="tasks-count" class="text-4xl font-bold">0</p>
                <p data-i18n="loading" id="tasks-text" class="text-zinc-400">Carregando...</p>
                <div class="w-full h-2 bg-zinc-700 rounded-full mt-4">
                    <div id="tasks-bar" class="w-full h-full bg-emerald-500 rounded-full"></div>
                </div>
            </div>

            <div onclick="window.location.href='habits.html'" class="bg-zinc-800/50 backdrop-blur-md rounded-2xl p-5 text-center cursor-pointer hover:opacity-80">
                <h2 data-i18n="todays_habits" class="text-sm text-zinc-400">Habitos de Hoje</h2>
                <p id="habits-count" class="text-4xl font-bold">0</p>
                <p data-i18n="loading" id="streak-text" class="text-zinc-400">Carregando...</p>
                <div class="w-full h-2 bg-zinc-700 rounded-full mt-4">
                    <div id="habits-bar" class="h-full bg-emerald-500 rounded-full"></div>
                </div>
            </div>

            <div class="bg-zinc-800/50 backdrop-blur-md rounded-2xl p-5 col-span-2">
                <h2 data-i18n="quick_notes" class="text-zinc-400">Notas Rapidas</h2>
                <p data-i18n="notes_count" id="notes-count" class="text-4xl font-bold">0 notas</p>
                <p data-i18n="loading" class="text-zinc-400">Carregando...</p>
            </div>

            <div class="bg-zinc-800/50 backdrop-blur-md rounded-2xl p-5 col-span-2">
                <h2 data-i18n="projects" class="text-zinc-400">Projetos</h2>
                <p data-i18n="projects_count" class="text-4xl font-bold">0 Projetos</p>
            </div>
        </main>

        <nav class="p-6 w-full text-center flex justify-around items-center fixed bottom-0 left-0 right-0 max-w-md mx-auto">
            <button onclick="window.location.href='tasks.html'" class="hover:scale-110 transition"><i class="ph ph-calendar-check text-2xl"></i></button>
            <button onclick="window.location.href='index.html'" class="bg-fuchsia-500 text-white rounded-full w-8 h-8 hover:bg-fuchsia-400 hover:scale-110 transition"><i class="ph ph-house text-2xl"></i></button>
            <button onclick="window.location.href='settings.html'" class="hover:scale-110 transition"><i class="ph ph-gear text-2xl"></i></button>
            <button class="bg-violet-600 text-white rounded-full w-8 h-8 hover:bg-violet-500 hover:scale-110 transition">+</button>
        </nav>

        <script type="module" src="js/index.js"></script>
        <script type="module" src="js/translation.js"></script>
    </body>
</html>
